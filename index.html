<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Portal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0c12;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
        radial-gradient(ellipse at 20% 50%, rgba(88,101,242,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(88,101,242,0.05) 0%, transparent 50%);
}
.login-card {
    background: #12141e;
    border: 1px solid #1e2235;
    border-radius: 20px;
    padding: 48px 40px;
    width: 420px;
    max-width: 90vw;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}
.logo {
    display: flex; align-items: center; gap: 10px; margin-bottom: 40px;
}
.logo-icon {
    width: 40px; height: 40px; background: linear-gradient(135deg, #5865f2, #4752c4);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: white; font-weight: 800;
}
.logo-text { font-size: 22px; font-weight: 700; }
.logo-text span { color: #5865f2; }
h1 { font-size: 24px; margin-bottom: 8px; }
.sub { color: #6b7280; font-size: 14px; margin-bottom: 32px; }
label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
input {
    width: 100%; padding: 12px 16px; background: #1a1d2e; border: 1px solid #252a40;
    border-radius: 8px; color: #e0e0e0; font-size: 14px; margin-bottom: 20px; outline: none;
    transition: border-color 0.2s;
}
input:focus { border-color: #5865f2; }
.btn {
    width: 100%; padding: 14px; border: none; border-radius: 8px;
    background: #5865f2; color: white; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
}
.btn:hover { background: #4752c4; box-shadow: 0 4px 20px rgba(88,101,242,0.4); transform: translateY(-1px); }
.divider { text-align: center; color: #374151; font-size: 13px; margin: 20px 0; position: relative; }
.divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #1e2235; }
.divider::before { left: 0; }
.divider::after { right: 0; }
.demo-note { text-align: center; font-size: 12px; color: #4b5563; margin-top: 24px; }
.demo-note a { color: #5865f2; text-decoration: none; }
</style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <div class="logo-icon">N</div>
        <div class="logo-text">Nexus<span>Portal</span></div>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your enterprise dashboard</p>
    <form onsubmit="event.preventDefault(); window.location.href='dashboard.html'">
        <label>Email</label>
        <input type="email" value="jay@cosmicalpha.io" placeholder="Enter your email">
        <label>Password</label>
        <input type="password" value="••••••••" placeholder="Enter your password">
        <button class="btn">Sign In →</button>
    </form>
    <div class="divider">or continue with</div>
    <div style="display:flex;gap:12px">
        <button onclick="window.location.href='dashboard.html'" style="flex:1;padding:10px;background:#1a1d2e;border:1px solid #252a40;border-radius:8px;color:#e0e0e0;cursor:pointer;font-size:13px;">Google</button>
        <button onclick="window.location.href='dashboard.html'" style="flex:1;padding:10px;background:#1a1d2e;border:1px solid #252a40;border-radius:8px;color:#e0e0e0;cursor:pointer;font-size:13px;">GitHub</button>
    </div>
    <p class="demo-note">Demo login — click Sign In to access the dashboard</p>
</div>
</body>
</html>
